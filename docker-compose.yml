# ==========================================
# StarNova API - Docker Compose
# ==========================================

version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: starnova-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: starnova
    volumes:
      - mongodb_data:/data/db
    networks:
      - starnova-network

  redis:
    image: redis:7-alpine
    container_name: starnova-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - starnova-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: starnova-api
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/starnova
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - api_logs:/app/logs
      - api_uploads:/app/uploads
    networks:
      - starnova-network

  nginx:
    image: nginx:alpine
    container_name: starnova-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - starnova-network

volumes:
  mongodb_data:
  redis_data:
  api_logs:
  api_uploads:

networks:
  starnova-network:
    driver: bridge
